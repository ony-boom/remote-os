name: Auto Deploy Apps

on:
  repository_dispatch:
    types: [app-updated]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Flake input to update (or "all")'
        required: true
        default: all
        type: choice
        options: [all, ony-world]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  APP_NAME: ${{ github.event.client_payload.app_name || inputs.app_name }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./config

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v17
        with:
          name: ony-boom
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: colmena

      - name: Update flake input
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if [ "$APP_NAME" = "all" ]; then
            nix flake update --commit-lock-file
          else
            nix flake update "$APP_NAME" --commit-lock-file
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy with Colmena
        run: make

      - name: Push flake.lock
        if: success()
        run: git push origin HEAD:${{ github.ref_name }}
